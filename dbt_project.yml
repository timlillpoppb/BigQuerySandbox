name: 'dbt_medallion'
version: '1.0.0'
config-version: 2

profile: 'dbt_medallion'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_medallion:
    bronze:
      +materialized: table
      +schema: bronze
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: table
      +schema: gold

seeds:
  +schema: seeds

snapshots:
  +target_schema: snapshots
  +unique_key: id
  +strategy: timestamp
  +updated_at: updated_at