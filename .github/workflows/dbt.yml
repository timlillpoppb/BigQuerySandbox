name: dbt CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - master
  pull_request:
    branches:
      - master

env:
  DBT_PROFILES_DIR: .
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI JOB — Quick validation on feature branches and PRs
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: dbt CI
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install dbt
        run: pip install dbt-bigquery==1.8.3

      - name: dbt deps
        run: dbt deps

      - name: dbt parse
        run: dbt parse --target dev

      - name: dbt build (quick test)
        run: dbt build --target dev --threads 4 --select state:modified+

  # ─────────────────────────────────────────────────────────────────────────────
  # CD JOB — Production deployment on master merge
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: dbt Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install dbt
        run: pip install dbt-bigquery==1.8.3

      - name: dbt deps
        run: dbt deps

      - name: dbt build (production)
        run: dbt build --target prod --threads 4
