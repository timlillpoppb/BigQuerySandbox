name: dbt CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - master
  pull_request:
    branches:
      - master

env:
  DBT_PROFILES_DIR: .
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI JOB — Quick validation on feature branches and PRs
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: dbt CI
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install dbt
        run: pip install dbt-bigquery==1.8.3

      - name: dbt deps
        run: dbt deps

      - name: dbt parse
        run: dbt parse --target dev

      - name: dbt build (quick test)
        run: dbt build --target dev --threads 4 --select state:modified+

  # ─────────────────────────────────────────────────────────────────────────────
  # CD JOB — Production deployment on master merge
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: dbt Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install dbt
        run: pip install dbt-bigquery==1.8.3

      - name: dbt deps
        run: dbt deps

      - name: dbt build (production)
        id: run_dbt
        shell: bash
        run: |
          STARTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "started_at=$STARTED_AT" >> "$GITHUB_OUTPUT"

          DBT_EXIT_CODE=0
          dbt build --target prod --threads 4 || DBT_EXIT_CODE=$?

          COMPLETED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "completed_at=$COMPLETED_AT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$DBT_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Log dbt run metadata
        if: always()
        run: |
          python scripts/log_dbt_run_metadata.py \
            --project-id "${{ secrets.GCP_PROJECT_ID }}" \
            --location "US" \
            --target-name "prod" \
            --target-dataset "prod_dataset" \
            --metadata-dataset "prod_dataset_ops" \
            --run-results-path "target/run_results.json" \
            --run-started-at "${{ steps.run_dbt.outputs.started_at }}" \
            --run-completed-at "${{ steps.run_dbt.outputs.completed_at }}" \
            --dbt-exit-code "${{ steps.run_dbt.outputs.exit_code }}" \
            --github-run-id "${{ github.run_id }}" \
            --github-sha "${{ github.sha }}" \
            --github-ref "${{ github.ref_name }}"

      - name: Fail workflow if dbt failed
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.run_dbt.outputs.exit_code }}" != "0" ]; then
            echo "dbt build failed with exit code ${{ steps.run_dbt.outputs.exit_code }}"
            exit 1
          fi
