version: 2

models:
  - name: brz_datastream
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 1000000
      - dbt_expectations.expect_table_column_count_to_equal:
          value: 8  # id, name, amount, created_at, updated_at, created_by, updated_by, dbt columns
      - dbt_expectations.expect_column_values_to_not_be_null:
          column: id
      - dbt_expectations.expect_column_values_to_be_of_type:
          column: amount
          column_type: FLOAT64

  - name: brz_pubsub
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 0
          max_value: 10000000
      - dbt_expectations.expect_column_values_to_not_be_null:
          column: id
      - dbt_expectations.expect_column_values_to_be_of_type:
          column: event_data
          column_type: STRING