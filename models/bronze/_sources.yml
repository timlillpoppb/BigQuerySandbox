version: 2

sources:
  - name: thelook_ecommerce
    database: bigquery-public-data
    schema: thelook_ecommerce
    description: >
      TheLook e-commerce public dataset from Google BigQuery. Modeled as a
      subscription/recurring revenue platform to derive MRR, churn, cohort
      retention, and customer lifetime value analytics.
    loader: bigquery_public_data
    tags: ['source', 'thelook']

    tables:
      - name: users
        description: Customer master — one row per registered user/subscriber.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 168, period: hour}
        columns:
          - name: id
            description: Surrogate user key.
            tests: [unique, not_null]
          - name: email
            description: User email address.
            tests: [unique, not_null]
          - name: created_at
            description: Registration timestamp.
            tests: [not_null]

      - name: orders
        description: Order header — one row per order placed by a user.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 72, period: hour}
        columns:
          - name: order_id
            description: Surrogate order key.
            tests: [unique, not_null]
          - name: user_id
            description: FK to users.id.
            tests: [not_null]
          - name: status
            description: Order fulfillment status.
            tests:
              - not_null
              - accepted_values:
                  values: ['complete', 'cancelled', 'returned', 'shipped', 'processing']

      - name: order_items
        description: Order line items — one row per product per order.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 72, period: hour}
        columns:
          - name: id
            description: Surrogate line item key.
            tests: [unique, not_null]
          - name: order_id
            description: FK to orders.order_id.
            tests: [not_null]
          - name: user_id
            description: FK to users.id.
            tests: [not_null]
          - name: product_id
            description: FK to products.id.
            tests: [not_null]

      - name: products
        description: Product catalog — one row per SKU.
        columns:
          - name: id
            description: Surrogate product key.
            tests: [unique, not_null]
          - name: name
            tests: [not_null]
          - name: category
            tests: [not_null]

      - name: events
        description: >
          User clickstream events — one row per user action. High-volume append-only table.
          Used to derive session analytics and funnel metrics.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: id
            description: Surrogate event key.
            tests: [unique, not_null]
          - name: user_id
            tests: [not_null]
          - name: session_id
            tests: [not_null]
          - name: event_type
            tests: [not_null]

      - name: inventory_items
        description: Inventory ledger — one row per inventory unit.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 168, period: hour}
        columns:
          - name: id
            description: Surrogate inventory key.
            tests: [unique, not_null]
          - name: product_id
            tests: [not_null]

      - name: distribution_centers
        description: Warehouse/distribution center master.
        columns:
          - name: id
            tests: [unique, not_null]
          - name: name
            tests: [not_null]
